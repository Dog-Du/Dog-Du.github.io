{{ define "main" }}
<div style="text-align:center; padding: 4rem 1rem;">
  <div style="font-size: 6rem; margin-bottom: 1rem;">( ﾟ∀ﾟ)σ</div>
  <h1 class="mb-3 text-4xl font-extrabold" style="color: rgb(var(--color-primary-500));">
    404
  </h1>
  <p class="mt-4 mb-2 text-xl text-neutral-600 dark:text-neutral-300"
     style="font-family: 'LXGW WenKai', sans-serif;">
    页面走丢了~
  </p>
  <p class="mb-8 text-neutral-400 dark:text-neutral-500"
     style="font-family: 'LXGW WenKai', sans-serif;">
    这个页面可能已经被搬走了，或者从来就不存在呢 (´・ω・`)
  </p>
  <div class="prose dark:prose-invert" style="display:inline-block;">
    <a href="/"
       class="inline-block px-6 py-3 rounded-full text-white font-medium transition-all duration-300 hover:scale-105"
       style="background: linear-gradient(135deg, rgb(var(--color-primary-400)), rgb(var(--color-secondary-500))); text-decoration:none; border:none;">
      🏠 回到首页
    </a>
    <span style="margin: 0 0.75rem; color: rgb(var(--color-neutral-300));">|</span>
    <a href="/posts/"
       class="inline-block px-6 py-3 rounded-full font-medium transition-all duration-300 hover:scale-105"
       style="border: 1px solid rgb(var(--color-primary-400)); color: rgb(var(--color-primary-500)); text-decoration:none;">
      📚 看看文章
    </a>
  </div>
  <p class="mt-12 text-sm text-neutral-300 dark:text-neutral-600"
     id="quote-404"
     style="font-family: 'LXGW WenKai', sans-serif; font-style: italic;">
  </p>
  <script>
    (function() {
      var quotes = [
        "「迷路的时候，就抬头看看星空吧。」—— 四月是你的谎言",
        "「不管前方的路有多苦，只要走的方向正确。」—— 千与千寻",
        "「人生中遇到的每个人，都有各自要走的路。」—— 夏目友人帐",
        "「即使被风吹散，花也会在某处再次绽放。」—— 未闻花名",
        "「就算迷了路，也比站在原地好。」—— 银魂"
      ];
      var el = document.getElementById('quote-404');
      if (el) el.textContent = quotes[Math.floor(Math.random() * quotes.length)];
    })();
  </script>
</div>
{{ end }}
