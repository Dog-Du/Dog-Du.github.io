{{/* 自定义头部扩展 - 字体和关键资源 */}}

{{/* 🌸 霞鹜文楷 Lite - 常用 6000+ 汉字子集版，体积约为完整版的 1/3（异步加载） */}}
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-lite-webfont@1.7.0/style.css"
      media="print" onload="this.media='all'">
<noscript>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-lite-webfont@1.7.0/style.css">
</noscript>

{{/* JetBrains Mono - 代码字体（via jsDelivr @fontsource，统一 CDN 源，国内友好）
     替换原 Google Fonts 方案，消除 fonts.googleapis.com / fonts.gstatic.com 依赖 */}}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.1.1/400.css"
      media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.1.1/500.css"
      media="print" onload="this.media='all'">
<noscript>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.1.1/400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.1.1/500.css">
</noscript>

{{/* 📷 GLightbox - 轻量图片灯箱（~11KB gzip） */}}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox@3.3.0/dist/css/glightbox.min.css"
      media="print" onload="this.media='all'">
<noscript>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox@3.3.0/dist/css/glightbox.min.css">
</noscript>

<style>
  /* 正文 & 标题统一使用霞鹜文楷 Lite（子集版）
   * font-family 名称不变（仍为 "LXGW WenKai Lite"），
   * Lite 版的 CSS 自动声明该 font-family。
   * 回退字体：Noto Sans SC → 系统字体栈 */
  .prose,
  h1, h2, h3, h4, h5, h6,
  .header,
  .nav-link,
  .footer,
  body {
    font-family: "LXGW WenKai Lite", "LXGW WenKai", "Noto Sans SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  /* 代码字体：JetBrains Mono 优先 */
  code, pre, kbd, samp {
    font-family: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, monospace;
  }
</style>
